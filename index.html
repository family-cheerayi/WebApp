// ═══════════════════════════════════════════════════════════════
// localStorage STORAGE (replaces window.storage — works anywhere)
// ═══════════════════════════════════════════════════════════════
const KEYS = { members:"fam_members", branches:"fam_branches", houses:"fam_houses", announcements:"fam_ann", users:"fam_users", settings:"fam_settings" };
const lsGet = (key, fallback) => { try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; } catch { return fallback; } };
const lsSet = (key, val)      => { try { localStorage.setItem(key, JSON.stringify(val)); } catch {} };

function useDB() {
  const [db, setDbRaw] = useState(null);
  useEffect(() => {
    setDbRaw({
      members:       lsGet(KEYS.members,       SEED.members),
      branches:      lsGet(KEYS.branches,      SEED.branches),
      houses:        lsGet(KEYS.houses,        SEED.houses),
      announcements: lsGet(KEYS.announcements, SEED.announcements),
      users:         lsGet(KEYS.users,         SEED.users),
      settings:      lsGet(KEYS.settings,      SEED.settings),
    });
  }, []);
  const update = useCallback((table, newData) => {
    lsSet(KEYS[table], newData);
    setDbRaw(prev => ({ ...prev, [table]: newData }));
  }, []);
  return [db, update];
}

const getAge = (dob) => { if (!dob) return null; const b=new Date(dob),t=new Date(); let a=t.getFullYear()-b.getFullYear(); if(t.getMonth()<b.getMonth()||(t.getMonth()===b.getMonth()&&t.getDate()<b.getDate()))a--; return a; };
const isBday = (dob) => { if(!dob)return false; const b=new Date(dob),t=new Date(); return b.getDate()===t.getDate()&&b.getMonth()===t.getMonth(); };
const ini    = (n)   => (n||"?").split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase();
const bColor = (id,branches) => (branches.find(b=>b.id===id)||{}).color||"#607D8B";
const fmtDate= (d)   => { try { return d?new Date(d).toLocaleDateString("en-IN",{day:"numeric",month:"short",year:"numeric"}):"—"; } catch { return d||"—"; } };
const nid    = ()    => "m_"+Date.now()+"_"+Math.random().toString(36).slice(2,5);

function toHijri(dateStr) {
  if (!dateStr) return "";
  try {
    const d = new Date(dateStr); if(isNaN(d))return "";
    const jd=Math.floor((14+d.getMonth()+1+12*Math.floor((d.getMonth()+1<=2?d.getFullYear()-1:d.getFullYear()))/12));
    const I=d.getFullYear()+4800-jd, J=(d.getMonth()+1)+12*jd-3;
    let JDN=d.getDate()+Math.floor((153*J+2)/5)+365*I+Math.floor(I/4)-Math.floor(I/100)+Math.floor(I/400)-32045;
    let l=JDN-1948440+10632; const n=Math.floor((l-1)/10631); l=l-10631*n+354;
    const J2=Math.floor((10985-l)/5316)*Math.floor((50*l)/17719)+Math.floor(l/5670)*Math.floor((43*l)/15238);
    l=l-Math.floor((30-J2)/15)*Math.floor((17719*J2)/50)-Math.floor(J2/16)*Math.floor((15238*J2)/43)+29;
    const month=Math.floor((24+l)/29), day=l-Math.floor((29*month)/2), year=30*n+J2-30;
    return `${year}-${String(month).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
  } catch { return ""; }
}

function Toast({msg,onDone}) {
  useEffect(()=>{ const t=setTimeout(onDone,2400); return()=>clearTimeout(t); },[]);
  return <div style={{position:"fixed",bottom:90,left:"50%",transform:"translateX(-50%)",background:"#1A3A2A",color:"#fff",padding:"10px 22px",borderRadius:24,fontSize:13,fontWeight:600,zIndex:9999,whiteSpace:"nowrap",boxShadow:"0 4px 20px rgba(0,0,0,.3)",animation:"toastIn .25s ease-out",pointerEvents:"none"}}>{msg}</div>;
}
const FG  = ({label,children,hint}) => <div style={{marginBottom:13}}><label style={{display:"block",fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.07em",color:"#9E9C94",marginBottom:4}}>{label}</label>{children}{hint&&<div style={{fontSize:11,color:"#9E9C94",marginTop:3}}>{hint}</div>}</div>;
const FI  = (props) => <input className="fi" {...props}/>;
const FS  = ({value,onChange,children,...r}) => <select className="fi" value={value} onChange={onChange} {...r}>{children}</select>;
const FTA = (props) => <textarea className="fi" {...props}/>;
const Btn = ({children,onClick,variant="primary",style={},...r}) => {
  const vs={primary:{background:"#2D6A4F",color:"#fff",border:"none"},secondary:{background:"#F4F3EF",color:"#1A1A18",border:"1px solid #E8E5DE"},danger:{background:"#FEF2F2",color:"#DC2626",border:"1px solid #FECACA"},"danger-solid":{background:"#DC2626",color:"#fff",border:"none"}};
  return <button onClick={onClick} style={{padding:"11px 18px",borderRadius:8,fontWeight:600,fontSize:14,cursor:"pointer",fontFamily:"inherit",...vs[variant],...style}} {...r}>{children}</button>;
};
const PCard = ({children,style={}}) => <div style={{background:"#fff",borderRadius:14,padding:18,boxShadow:"0 2px 10px rgba(0,0,0,.06)",marginBottom:12,border:"1px solid #E8E5DE",...style}}>{children}</div>;
const PLbl  = ({children}) => <div style={{fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.08em",color:"#9E9C94",marginBottom:10}}>{children}</div>;
const PStat = ({label,val,color}) => <div><div style={{fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em",color:"#9E9C94",marginBottom:3}}>{label}</div><div style={{fontSize:14,fontWeight:500,color:color||"#1A1A18"}}>{val||"—"}</div></div>;

function Sheet({title,onClose,children,footer}) {
  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.55)",zIndex:500,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
      <div style={{background:"#fff",borderRadius:"20px 20px 0 0",width:"100%",maxWidth:430,maxHeight:"90vh",display:"flex",flexDirection:"column",animation:"sheetUp .3s ease-out"}}>
        <div style={{padding:"14px 20px 0",flexShrink:0}}>
          <div style={{width:40,height:4,background:"#E8E5DE",borderRadius:2,margin:"0 auto 14px"}}/>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
            <div style={{fontFamily:"'Playfair Display',serif",fontSize:18,fontWeight:700}}>{title}</div>
            <button onClick={onClose} style={{background:"#FEF2F2",border:"1px solid #FECACA",borderRadius:8,padding:"5px 12px",cursor:"pointer",fontSize:12,fontWeight:700,color:"#DC2626",fontFamily:"inherit"}}>✕ Cancel</button>
          </div>
        </div>
        <div style={{overflowY:"auto",padding:"0 20px 4px",flex:1}}>{children}</div>
        {footer&&<div style={{padding:"12px 20px 20px",borderTop:"1px solid #E8E5DE",flexShrink:0}}>{footer}</div>}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// SPOUSE EDITOR — free text, multiple spouses
// ═══════════════════════════════════════════════════════════════
function SpouseEditor({spouses, onChange}) {
  const list = spouses || [];
  const add = () => onChange([...list, {name:"", id:null}]);
  const remove = (i) => onChange(list.filter((_,j)=>j!==i));
  const update = (i,val) => onChange(list.map((s,j)=>j===i?{...s,name:val}:s));
  return (
    <div>
      {list.map((s,i)=>(
        <div key={i} style={{display:"flex",gap:8,marginBottom:8,alignItems:"center"}}>
          <input className="fi" value={s.name} onChange={e=>update(i,e.target.value)} placeholder={`Spouse ${i+1} name`} style={{flex:1}}/>
          <button onClick={()=>remove(i)} style={{width:32,height:32,border:"1px solid #FECACA",borderRadius:8,background:"#FEF2F2",color:"#DC2626",cursor:"pointer",fontSize:16,flexShrink:0,fontFamily:"inherit"}}>✕</button>
        </div>
      ))}
      <button onClick={add} style={{width:"100%",padding:"9px",border:"1.5px dashed #D8EDD4",borderRadius:8,background:"none",color:"#2D6A4F",fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>+ Add Spouse</button>
    </div>
  );
}

        <FG label="House"><FS value={f.houseId||""} onChange={e=>set("houseId",e.target.value)}><option value="">— No house —</option>{houses.map(h=><option key={h.id} value={h.id}>{h.id} — {h.name}</option>)}</FS></FG>
        {(()=>{const h=houses.find(x=>x.id===f.houseId);return h?<div style={{background:"#D8EDD4",border:"1px solid #B7D9C8",borderRadius:8,padding:14,fontSize:13}}><div style={{fontWeight:700,color:"#2D6A4F"}}>{h.name}</div><div style={{marginTop:2,color:"#3A7A5A"}}>{h.address}</div><code style={{marginTop:6,display:"inline-block",background:"#fff",padding:"2px 8px",borderRadius:4,fontSize:11}}>📍 {h.plusCode}</code></div>:null;})()}
      </>}

        <FG label="Date of Death" hint="Hijri date is auto-calculated."><FI type="date" value={f.dod||""} onChange={e=>handleDod(e.target.value)}/></FG>

        <FG label="Hijri Adjustment (days)">
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <button onClick={()=>set("hijriAdj",(f.hijriAdj||0)-1)} style={{width:36,height:36,borderRadius:"50%",border:"1px solid #E8E5DE",background:"#F4F3EF",fontSize:18,cursor:"pointer"}}>−</button>
            <span style={{fontSize:16,fontWeight:600,minWidth:24,textAlign:"center"}}>{f.hijriAdj||0}</span>
            <button onClick={()=>set("hijriAdj",(f.hijriAdj||0)+1)} style={{width:36,height:36,borderRadius:"50%",border:"1px solid #E8E5DE",background:"#F4F3EF",fontSize:18,cursor:"pointer"}}>+</button>
            <span style={{fontSize:12,color:"#9E9C94"}}>days</span>
          </div>
        </FG>
      </>}
    </Sheet>
  );
}

const NW=88, NH=90, HGAP=14, SGAP=20, VGAP=96;
// NW=node width, HGAP=gap between siblings, SGAP=gap spouse to root, VGAP=vertical

// ── Long press hook ───────────────────────────────────────────
function useLongPress(onLongPress, onClick, delay=500) {
  const timer = useRef(null);
  const fired = useRef(false);
  const start = (e) => { fired.current=false; timer.current=setTimeout(()=>{ fired.current=true; onLongPress(e); },delay); };
  const cancel = () => clearTimeout(timer.current);
  const tap = (e) => { if(!fired.current) onClick(e); };
  return {
    onMouseDown:start, onMouseUp:cancel, onMouseLeave:cancel,
    onTouchStart:e=>{e.preventDefault();start(e);},
    onTouchEnd:e=>{e.preventDefault();cancel();tap(e);},
    onTouchMove:cancel,
    onClick:e=>e.preventDefault(),
  };
}

// ── Children group for one spouse ────────────────────────────
// daughters on left sorted by dob, sons on right sorted by dob
function ChildrenGroup({parentId, spouseIdx, members, branches, highlightId, onProfile, onDrillDown, onLongPress, user, genDepth=1}) {
  const childBand = getGenBand(genDepth);
  // All children whose parentId matches AND whose matrilinealSpouseIdx matches (or 0 for first/default)
  const allChildren = members.filter(m=>m.parentId===parentId&&(m.spouseIdx||0)===spouseIdx);
  const daughters = allChildren.filter(m=>m.gender==="F").sort((a,b)=>(a.dob||"")>(b.dob||"")?1:-1);
  const sons      = allChildren.filter(m=>m.gender==="M").sort((a,b)=>(a.dob||"")>(b.dob||"")?1:-1);
  const ordered   = [...daughters,...sons]; // females left, males right

  if(ordered.length===0) return null;

  const totalW = ordered.length*(NW+HGAP)-HGAP;
  const halfW = totalW/2;

  return (
    <div style={{display:"flex",flexDirection:"column",alignItems:"center"}}>
      {/* Generation band indicator line */}
      <div style={{width:2,height:8,background:childBand.border,borderRadius:1,margin:"0 auto 0"}} />
      {/* Connector lines via SVG */}
      <svg width={totalW+4} height={VGAP} style={{display:"block",overflow:"visible",flexShrink:0}}>
        {ordered.map((_,i)=>{
          const cx = i*(NW+HGAP)+NW/2+2;
          return <line key={i} x1={cx} y1={VGAP/2} x2={cx} y2={VGAP} stroke="#C8C5BE" strokeWidth={1.5} strokeLinecap="round"/>;
        })}
        <line x1={2+NW/2} y1={VGAP/2} x2={2+(ordered.length-1)*(NW+HGAP)+NW/2} y2={VGAP/2} stroke="#C8C5BE" strokeWidth={1.5} strokeLinecap="round"/>
        <line x1={halfW+2} y1={0} x2={halfW+2} y2={VGAP/2} stroke="#C8C5BE" strokeWidth={1.5} strokeLinecap="round"/>
      </svg>
      {/* Child cards row — tinted with next generation colour */}
      <div style={{display:"flex",gap:HGAP,alignItems:"flex-start",padding:"10px 8px 8px",background:childBand.bg,borderRadius:14,border:`1px solid ${childBand.border}`}}>
        {ordered.map(child=>{
          const hasKids = members.some(m=>m.parentId===child.id)||can.addChildTo(user,child);
          return (
            <div key={child.id} style={{display:"flex",flexDirection:"column",alignItems:"center"}}>
              <PersonCard member={child} branches={branches} isHighlighted={child.id===highlightId}
                onClick={()=>onProfile(child)} onLongPress={onLongPress}/>
              {hasKids&&(
                <button onClick={e=>{e.stopPropagation();onDrillDown(child);}}
                  style={{marginTop:6,width:24,height:24,borderRadius:"50%",
                    border:`2px solid ${child.gender==="M"?"#1565C0":"#6A1E55"}`,
                    background:"#fff",color:child.gender==="M"?"#1565C0":"#6A1E55",
                    fontSize:15,fontWeight:700,cursor:"pointer",
                    display:"flex",alignItems:"center",justifyContent:"center",
                    boxShadow:"0 2px 6px rgba(0,0,0,.1)",lineHeight:1}}>+</button>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── Main visual tree level ────────────────────────────────────
// Style 1: Root centre, spouses fan left/right, children below each
function VisualTreeLevel({rootId,members,branches,highlightId,onProfile,onDrillDown,user,onLongPress,genDepth=0}) {
  const root = members.find(m=>m.id===rootId);
  if(!root) return <div style={{padding:40,color:"#9E9C94",textAlign:"center"}}>Member not found</div>;

  // Get spouses list — from spouses array (free text) or legacy spouseId
  const spousesList = root.spouses && root.spouses.length>0
    ? root.spouses.filter(s=>s.name&&s.name.trim())
    : (root.spouseId ? [{name:"Spouse",id:root.spouseId}] : []);

  // Children grouped by spouseIdx
  const allChildren = members.filter(m=>m.parentId===rootId);

  // Layout: root in centre, spouses spread left and right
  // spousesList[0] → left of root, [1] → right, [2] → far left, [3] → far right, etc.
  const leftSpouses  = spousesList.filter((_,i)=> i%2===0); // 0,2,4 → left side
  const rightSpouses = spousesList.filter((_,i)=> i%2===1); // 1,3,5 → right side

  // Helper: get children for spouse at original index
  const getChildGroup = (origIdx) => {
    const daughters = allChildren.filter(m=>m.gender==="F"&&(m.spouseIdx||0)===origIdx).sort((a,b)=>(a.dob||"")>(b.dob||"")?1:-1);
    const sons      = allChildren.filter(m=>m.gender==="M"&&(m.spouseIdx||0)===origIdx).sort((a,b)=>(a.dob||"")>(b.dob||"")?1:-1);
    return [...daughters,...sons];
  };

  // Unattributed children (no spouseIdx, or spouseIdx undefined when no spouses)
  const unattributed = spousesList.length===0
    ? allChildren.sort((a,b)=>{ if(a.gender!==b.gender)return a.gender==="F"?-1:1; return (a.dob||"")>(b.dob||"")?1:-1; })
    : [];

  return (
    <div style={{display:"flex",flexDirection:"column",alignItems:"center"}}>
      {/* ── TOP ROW: Left spouses ♥ ROOT ♥ Right spouses ── */}
      <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"nowrap"}}>
        {/* Left spouses (reversed so closest is nearest root) */}
        {[...leftSpouses].reverse().map((sp,i)=>{
          const origIdx = (leftSpouses.length-1-i)*2;
          return (
            <div key={origIdx} style={{display:"flex",alignItems:"center",gap:8}}>
              <SpousePill name={sp.name}/>
              <div style={{fontSize:13,color:"#C9A84C",fontWeight:700}}>♥</div>
            </div>
          );
        })}

        {/* Root person */}
        <RootBox member={root} onClick={()=>onProfile(root)} onLongPress={onLongPress} branches={branches}/>

        {/* Right spouses */}
        {rightSpouses.map((sp,i)=>{
          const origIdx = i*2+1;
          return (
            <div key={origIdx} style={{display:"flex",alignItems:"center",gap:8}}>
              <div style={{fontSize:13,color:"#C9A84C",fontWeight:700}}>♥</div>
              <SpousePill name={sp.name}/>
            </div>
          );
        })}
      </div>

      {/* ── CHILDREN SECTION ── */}
      {(spousesList.length>0||unattributed.length>0)&&(
        <div style={{display:"flex",gap:24,alignItems:"flex-start",marginTop:0,flexWrap:"wrap",justifyContent:"center"}}>
          {/* Left spouse children groups */}
          {[...leftSpouses].reverse().map((sp,i)=>{
            const origIdx=(leftSpouses.length-1-i)*2;
            const kids=getChildGroup(origIdx);
            if(kids.length===0)return null;
            return (
              <div key={origIdx} style={{display:"flex",flexDirection:"column",alignItems:"center"}}>
                {/* Spouse label above group */}
                <div style={{fontSize:9,color:"#C9A84C",fontWeight:700,marginBottom:4,letterSpacing:"0.04em"}}>
                  {sp.name}'s children
                </div>
                <ChildrenGroup parentId={rootId} spouseIdx={origIdx} members={members} branches={branches}
                  highlightId={highlightId} onProfile={onProfile} onDrillDown={onDrillDown}
                  onLongPress={onLongPress} user={user} genDepth={genDepth+1}/>
              </div>
            );
          })}

          {/* Unattributed children (no spouses defined) */}
          {unattributed.length>0&&(
            <ChildrenGroup parentId={rootId} spouseIdx={0} members={members} branches={branches}
              highlightId={highlightId} onProfile={onProfile} onDrillDown={onDrillDown}
              onLongPress={onLongPress} user={user} genDepth={genDepth+1}/>
          )}

          {/* Right spouse children groups */}
          {rightSpouses.map((sp,i)=>{
            const origIdx=i*2+1;
            const kids=getChildGroup(origIdx);
            if(kids.length===0)return null;
            return (
              <div key={origIdx} style={{display:"flex",flexDirection:"column",alignItems:"center"}}>
                <div style={{fontSize:9,color:"#C9A84C",fontWeight:700,marginBottom:4,letterSpacing:"0.04em"}}>
                  {sp.name}'s children
                </div>
                <ChildrenGroup parentId={rootId} spouseIdx={origIdx} members={members} branches={branches}
                  highlightId={highlightId} onProfile={onProfile} onDrillDown={onDrillDown}
                  onLongPress={onLongPress} user={user} genDepth={genDepth+1}/>
              </div>
            );
          })}
        </div>
      )}

      {spousesList.length===0&&unattributed.length===0&&(
        <div style={{marginTop:28,fontSize:13,color:"#B0ABA3",textAlign:"center"}}>No children recorded</div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// GENERATION COLOUR BANDS
// ═══════════════════════════════════════════════════════════════
const GEN_BANDS = [
  { bg:"#E8F4EF", border:"#A8D4B8", label:"Generation 1 — Founders",      accent:"#2D6A4F" },
  { bg:"#E3EEF9", border:"#A8C8E8", label:"Generation 2 — Children",       accent:"#1565C0" },
  { bg:"#EEE4F4", border:"#C4A8E0", label:"Generation 3 — Grandchildren",  accent:"#6A1E55" },
  { bg:"#FFF3E0", border:"#F0C878", label:"Generation 4",                  accent:"#B5451B" },
  { bg:"#FDE8E8", border:"#F0A8A8", label:"Generation 5",                  accent:"#C62828" },
  { bg:"#E8F4F8", border:"#90CAD8", label:"Generation 6",                  accent:"#00838F" },
  { bg:"#F4F4E8", border:"#C8C890", label:"Generation 7",                  accent:"#827717" },
  { bg:"#F0E8F4", border:"#C4A8D4", label:"Generation 8",                  accent:"#4A148C" },
];
const getGenBand = (depth) => GEN_BANDS[Math.min(depth, GEN_BANDS.length-1)];

// Helper: compute depth of a member from root
function getMemberDepth(memberId, members) {
  let depth = 0, id = memberId;
  while(id) {
    const m = members.find(x=>x.id===id);
    if(!m||!m.parentId) break;
    depth++;
    id = m.parentId;
  }
  return depth;
}

// Helper: build ancestor chain from root down to a memberId
function getAncestorChain(memberId, members) {
  const chain = [];
  let id = memberId;
  while(id) {
    const m = members.find(x=>x.id===id);
    if(!m) break;
    chain.unshift(m);
    id = m.parentId;
  }
  return chain; // [root, ..., memberId]
}

// ═══════════════════════════════════════════════════════════════
// ANCESTOR BREADCRUMB TRAIL
// ═══════════════════════════════════════════════════════════════
function AncestorBreadcrumb({stack, members, onJumpTo}) {
  const scrollRef = useRef(null);
  const chain = stack.map(id=>members.find(m=>m.id===id)).filter(Boolean);

  // Auto-scroll to end (current)
  useEffect(()=>{
    if(scrollRef.current) {
      scrollRef.current.scrollLeft = scrollRef.current.scrollWidth;
    }
  },[stack.length]);

  if(chain.length === 0) return null;

  return (
    <div style={{background:"#fff",borderBottom:"1px solid #EDECEA",padding:"8px 12px 6px"}}>
      <div style={{fontSize:9,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.08em",color:"#B0ABA3",marginBottom:5}}>
        ↑ Ancestry Path
      </div>
      <div ref={scrollRef} style={{display:"flex",alignItems:"center",gap:0,overflowX:"auto",scrollbarWidth:"none",WebkitOverflowScrolling:"touch"}}>
        {chain.map((m,i)=>{
          const depth = i;
          const band = getGenBand(depth);
          const isCurrent = i === chain.length-1;
          const isRoot = i === 0;
          return (
            <div key={m.id} style={{display:"flex",alignItems:"center",gap:0,flexShrink:0}}>
              {/* Node */}
              <div
                onClick={()=>!isCurrent&&onJumpTo(i)}
                style={{
                  display:"flex",flexDirection:"column",alignItems:"center",
                  padding:"4px 8px",borderRadius:10,cursor:isCurrent?"default":"pointer",
                  background: isCurrent ? band.bg : "transparent",
                  border: isCurrent ? `1.5px solid ${band.border}` : "1.5px solid transparent",
                  transition:"all .15s",
                }}
              >
                {/* Avatar */}
                <div style={{
                  width:28,height:28,borderRadius:"50%",
                  background: isCurrent ? band.accent : "#D8D5CE",
                  display:"flex",alignItems:"center",justifyContent:"center",
                  color:"#fff",fontSize:9,fontWeight:700,marginBottom:3,
                  overflow:"hidden",flexShrink:0,
                  boxShadow: isCurrent ? `0 0 0 2px ${band.border}` : "none",
                }}>
                  {m.photo
                    ? <img src={m.photo} alt={m.fullName} style={{width:"100%",height:"100%",objectFit:"cover"}}/>
                    : ini(m.fullName)
                  }
                </div>
                {/* Name */}
                <div style={{
                  fontSize:9,fontWeight: isCurrent?700:500,
                  color: isCurrent ? band.accent : "#9E9C94",
                  whiteSpace:"nowrap",maxWidth:56,overflow:"hidden",textOverflow:"ellipsis",textAlign:"center",
                }}>
                  {m.nickName||m.fullName.split(" ")[0]}
                  {isRoot&&" 🌿"}
                </div>
                {/* Gen number */}
                <div style={{fontSize:8,color: isCurrent ? band.accent : "#C8C5BE",marginTop:1}}>
                  Gen {depth+1}
                </div>
              </div>
              {/* Arrow between nodes */}
              {i < chain.length-1 && (
                <div style={{color:"#C8C5BE",fontSize:14,padding:"0 1px",marginTop:-8}}>›</div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// TREE SCREEN
// ═══════════════════════════════════════════════════════════════
function TreeScreen({db,updateDB,onProfile,highlightId,clearHighlight,user}) {
  const {members,branches,houses}=db;
  const [treeView,setTreeView]=useState("navigate"); // "navigate" | "overview"
  const [stack,setStack]=useState(["root"]);
  const [showAdd,setShowAdd]=useState(false);
  const [editingMember,setEditingMember]=useState(null);
  const scrollRef=useRef(null);
  const currentRootId=stack[stack.length-1];
  const currentRoot=members.find(m=>m.id===currentRootId);
  const currentDepth=stack.length-1;
  const currentBand=getGenBand(currentDepth);

  // Navigate by highlight (search)
  useEffect(()=>{
    if(!highlightId)return;
    const target=members.find(m=>m.id===highlightId); if(!target)return;
    const ancestors=[]; let id=target.parentId;
    while(id&&id!=="root"){ancestors.unshift(id);const m=members.find(x=>x.id===id);id=m?.parentId;}
    setStack(["root",...ancestors]);
    if(scrollRef.current)scrollRef.current.scrollTo({top:0,left:0,behavior:"smooth"});
  },[highlightId]);

  const drillDown=(member)=>{ clearHighlight(); setStack(s=>[...s,member.id]); if(scrollRef.current)scrollRef.current.scrollTo({top:0,left:0,behavior:"smooth"}); };
  const goBack=()=>{ if(stack.length>1){setStack(s=>s.slice(0,-1)); if(scrollRef.current)scrollRef.current.scrollTo({top:0,left:0,behavior:"smooth"});} };
  const jumpTo=(idx)=>{ setStack(s=>s.slice(0,idx+1)); if(scrollRef.current)scrollRef.current.scrollTo({top:0,left:0,behavior:"smooth"}); };
  const canAdd=user.role==="super_admin"||can.addChildTo(user,currentRoot||{branchId:null,id:"root"});
  const [contextMember,setContextMember]=useState(null);
  const [addChildTarget,setAddChildTarget]=useState(null);
  const [confirmDeleteMember,setConfirmDeleteMember]=useState(null);
  const handleEditSave=(data)=>{ updateDB("members",members.map(m=>m.id===data.id?data:m)); setEditingMember(null); };
  const handleEditDelete=(id)=>{ updateDB("members",members.filter(m=>m.id!==id)); setEditingMember(null); if(stack.includes(id))setStack(["root"]); };
  const onLongPress=(member)=>{ if(user.role==="super_admin"||can.editMember(user,member))setContextMember(member); };

  return (
    <div style={{display:"flex",flexDirection:"column",height:"100%",background:"#FAFAF8"}}>

      {/* ── Fixed top bar — always visible ── */}
      <div style={{flexShrink:0,background:"#fff",borderBottom:"1px solid #EDECEA"}}>
        {/* Title row */}
        <div style={{padding:"50px 16px 8px",display:"flex",alignItems:"center",gap:10}}>
          {stack.length>1&&(
            <button onClick={goBack} style={{width:34,height:34,borderRadius:"50%",border:`1.5px solid ${currentBand.border}`,background:currentBand.bg,fontSize:18,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontWeight:700,color:currentBand.accent,lineHeight:1}}>−</button>
          )}
          <div style={{flex:1}}>
            <div style={{fontFamily:"'Playfair Display',serif",fontSize:20,fontWeight:700,color:"#1A1A18"}}>
              {treeView==="overview"?"Full Family Tree":(stack.length===1?"Family Tree":currentRoot?.fullName||"")}
            </div>
            <div style={{fontSize:10,fontWeight:700,color:currentBand.accent,letterSpacing:"0.05em",marginTop:1}}>
              {treeView==="overview"?"Pan & zoom to explore all generations":currentBand.label}
            </div>
          </div>
          {/* Overview / Navigate toggle */}
          <button onClick={()=>setTreeView(v=>v==="navigate"?"overview":"navigate")} style={{padding:"7px 12px",background:treeView==="overview"?"#1A3A2A":"#F4F3EF",color:treeView==="overview"?"#fff":"#5C5B56",border:`1px solid ${treeView==="overview"?"#1A3A2A":"#E8E5DE"}`,borderRadius:20,fontSize:11,fontWeight:600,cursor:"pointer",flexShrink:0,fontFamily:"inherit"}}>
            {treeView==="overview"?"🗺 Navigate":"🌍 Overview"}
          </button>
          {treeView==="navigate"&&canAdd&&(
            <button onClick={()=>setShowAdd(true)} style={{padding:"7px 14px",background:currentBand.accent,color:"#fff",border:"none",borderRadius:20,fontSize:12,fontWeight:600,cursor:"pointer",flexShrink:0,fontFamily:"inherit"}}>+ Add</button>
          )}
        </div>

        {/* Ancestor breadcrumb — only in navigate mode */}
        {treeView==="navigate"&&<AncestorBreadcrumb stack={stack} members={members} onJumpTo={jumpTo}/>}

        {/* Legend — only in navigate mode */}
        {treeView==="navigate"&&(
          <div style={{display:"flex",gap:10,alignItems:"center",padding:"6px 14px 8px",flexWrap:"wrap"}}>
            <div style={{display:"flex",alignItems:"center",gap:3}}><div style={{width:9,height:9,borderRadius:2,background:"#EEF4FB",border:"1.5px solid #1565C0"}}/><span style={{fontSize:9,color:"#9E9C94"}}>♂ Son</span></div>
            <div style={{display:"flex",alignItems:"center",gap:3}}><div style={{width:9,height:9,borderRadius:2,background:"#FDF0F8",border:"1.5px solid #6A1E55"}}/><span style={{fontSize:9,color:"#9E9C94"}}>♀ Daughter</span></div>
            <div style={{display:"flex",alignItems:"center",gap:3}}><div style={{width:9,height:9,borderRadius:8,background:"#FFFBEF",border:"1.5px solid #C9A84C"}}/><span style={{fontSize:9,color:"#9E9C94"}}>♥ Spouse</span></div>
            <span style={{fontSize:9,color:"#C8C5BE",marginLeft:"auto"}}>Hold card → options</span>
          </div>
        )}
      </div>

      {/* ── Navigate mode: interactive drill-down tree ── */}
      {treeView==="navigate"&&(
        <div ref={scrollRef} style={{flex:1,overflow:"auto",background:currentBand.bg}}>
          {/* Generation band header strip */}
          <div style={{padding:"8px 16px 6px",borderBottom:`1px solid ${currentBand.border}`,display:"flex",alignItems:"center",gap:8,background:currentBand.bg,position:"sticky",top:0,zIndex:10}}>
            <div style={{width:8,height:8,borderRadius:"50%",background:currentBand.accent,flexShrink:0}}/>
            <div style={{fontSize:11,fontWeight:700,color:currentBand.accent,letterSpacing:"0.04em"}}>{currentBand.label}</div>
            {stack.length>1&&<div style={{marginLeft:"auto",fontSize:10,color:currentBand.accent,opacity:.7}}>Tap breadcrumb ↑ to go back</div>}
          </div>
          {/* Tree content */}
          <div style={{padding:"20px 16px 80px",display:"flex",justifyContent:"center",minHeight:"60vh"}}>
            <div style={{minWidth:"max-content",display:"flex",justifyContent:"center"}}>
              <VisualTreeLevel rootId={currentRootId} members={members} branches={branches} highlightId={highlightId} onProfile={onProfile} onDrillDown={drillDown} user={user} onLongPress={onLongPress} genDepth={currentDepth}/>
            </div>
          </div>
          {/* Next generation hint */}
          {members.some(m=>m.parentId===currentRootId)&&(
            <div style={{margin:"0 16px 16px",padding:"10px 14px",background:getGenBand(currentDepth+1).bg,border:`1px dashed ${getGenBand(currentDepth+1).border}`,borderRadius:12,display:"flex",alignItems:"center",gap:8}}>
              <div style={{width:8,height:8,borderRadius:"50%",background:getGenBand(currentDepth+1).accent,flexShrink:0}}/>
              <div style={{fontSize:11,color:getGenBand(currentDepth+1).accent,fontWeight:600}}>Tap + on any child to enter {getGenBand(currentDepth+1).label}</div>
            </div>
          )}
        </div>
      )}

      {/* ── Overview mode: pan/zoom full tree ── */}
      {treeView==="overview"&&(
        <div style={{flex:1,overflow:"hidden",position:"relative"}}>
          <OverviewTreeScreen db={db}/>
        </div>
      )}

      {/* ── Modals (always present) ── */}
      {contextMember&&<ContextMenu member={contextMember} onAddChild={handleContextAddChild} onEdit={handleContextEdit} onDelete={handleContextDelete} onClose={()=>setContextMember(null)}/>}
      {(showAdd||addChildTarget)&&<EditMemberModal member={null} isNew parentMember={addChildTarget||currentRoot} branches={branches} houses={houses} members={members} onSave={d=>{updateDB("members",[...members,d]);setShowAdd(false);setAddChildTarget(null);}} onDelete={()=>{}} onClose={()=>{setShowAdd(false);setAddChildTarget(null);}}/>}
      {editingMember&&<EditMemberModal member={editingMember} isNew={false} branches={branches} houses={houses} members={members} onSave={handleEditSave} onDelete={handleEditDelete} onClose={()=>setEditingMember(null)}/>}
      {confirmDeleteMember&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.6)",zIndex:900,display:"flex",alignItems:"center",justifyContent:"center",padding:"0 32px"}}><div style={{background:"#fff",borderRadius:18,padding:24,textAlign:"center",width:"100%",maxWidth:320}}><div style={{fontSize:40,marginBottom:12}}>🗑️</div><div style={{fontFamily:"'Playfair Display',serif",fontSize:18,fontWeight:700,marginBottom:8}}>Delete {confirmDeleteMember.fullName}?</div><div style={{fontSize:13,color:"#9E9C94",marginBottom:20,lineHeight:1.5}}>This will permanently remove this member.</div><div style={{display:"flex",gap:10}}><button onClick={()=>setConfirmDeleteMember(null)} style={{flex:1,padding:12,border:"1px solid #E8E5DE",borderRadius:8,background:"#F4F3EF",fontWeight:600,cursor:"pointer",fontFamily:"inherit",fontSize:14}}>Cancel</button><button onClick={()=>{updateDB("members",members.filter(m=>m.id!==confirmDeleteMember.id));setConfirmDeleteMember(null);if(stack.includes(confirmDeleteMember.id))setStack(["root"]);}} style={{flex:1,padding:12,border:"none",borderRadius:8,background:"#DC2626",color:"#fff",fontWeight:600,cursor:"pointer",fontFamily:"inherit",fontSize:14}}>Delete</button></div></div></div>}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// MEMBER PROFILE
// ═══════════════════════════════════════════════════════════════
function MemberProfile({member,db,onBack,onSelectMember,user,onSave,onDelete}) {
  const {members,branches,houses}=db;
  const [editing,setEditing]=useState(false);
  const branch=branches.find(b=>b.id===member.branchId);
  const house=houses.find(h=>h.id===member.houseId);
  const children=members.filter(m=>m.parentId===member.id);
  const spouse=member.spouseId?members.find(m=>m.id===member.spouseId):null;
  const color=branch?branch.color:"#2D6A4F";
  const canEdit=can.editMember(user,member);
  const photoRef=useRef(null);

  const handlePhotoUpload=(e)=>{
    const file=e.target.files[0];
    if(!file)return;
    if(file.size>2*1024*1024){alert("Photo must be under 2MB");return;}
    const reader=new FileReader();
    reader.onload=(ev)=>{ onSave({...member,photo:ev.target.result}); };
    reader.readAsDataURL(file);
  };

  const handleRemovePhoto=()=>{ onSave({...member,photo:null}); };

  return (
    <div style={{paddingBottom:20}}>
      <div style={{background:`linear-gradient(180deg,#1A3A2A 0%,${color} 100%)`,padding:"52px 20px 80px",textAlign:"center",position:"relative"}}>
        <button onClick={onBack} style={{position:"absolute",top:52,left:16,background:"rgba(255,255,255,.15)",border:"none",color:"#fff",width:36,height:36,borderRadius:"50%",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>‹</button>
        {canEdit&&<button onClick={()=>setEditing(true)} style={{position:"absolute",top:52,right:16,background:"rgba(255,255,255,.2)",border:"1px solid rgba(255,255,255,.3)",color:"#fff",padding:"6px 14px",borderRadius:20,fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>✏️ Edit</button>}
        {/* Photo circle — tap to upload if canEdit */}
        <div style={{position:"relative",width:90,height:90,margin:"0 auto 12px"}}>
          <div style={{width:90,height:90,borderRadius:"50%",background:member.photo?"transparent":"rgba(255,255,255,.2)",border:"3px solid rgba(255,255,255,.5)",display:"flex",alignItems:"center",justifyContent:"center",overflow:"hidden",cursor:canEdit?"pointer":"default"}}
            onClick={()=>canEdit&&photoRef.current&&photoRef.current.click()}>
            {member.photo
              ?<img src={member.photo} alt={member.fullName} style={{width:"100%",height:"100%",objectFit:"cover"}}/>
              :<div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
                <span style={{fontSize:26,color:"#fff",fontWeight:700,fontFamily:"'Playfair Display',serif"}}>{ini(member.fullName)}</span>
                {canEdit&&<span style={{fontSize:9,color:"rgba(255,255,255,.6)",letterSpacing:"0.05em"}}>TAP TO ADD</span>}
              </div>
            }
          </div>
          {canEdit&&member.photo&&(
            <button onClick={handleRemovePhoto} style={{position:"absolute",top:0,right:0,width:22,height:22,borderRadius:"50%",background:"#DC2626",border:"2px solid #fff",color:"#fff",fontSize:12,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",lineHeight:1}}>✕</button>
          )}
          {canEdit&&<input ref={photoRef} type="file" accept="image/*" onChange={handlePhotoUpload} style={{display:"none"}}/>}
        </div>
        <div style={{fontFamily:"'Playfair Display',serif",fontSize:24,fontWeight:700,color:"#fff"}}>{member.fullName}</div>
        {member.nickName&&<div style={{fontSize:14,color:"rgba(255,255,255,.7)",marginTop:2}}>"{member.nickName}"</div>}
        {branch&&<div style={{display:"inline-flex",alignItems:"center",gap:6,marginTop:10,background:"rgba(255,255,255,.15)",padding:"5px 12px",borderRadius:20,fontSize:12,color:"#fff"}}><div style={{width:8,height:8,borderRadius:"50%",background:branch.color}}/>{branch.name}</div>}
        {member.status==="deceased"&&<div style={{marginTop:8,fontSize:12,background:"rgba(0,0,0,.3)",padding:"4px 12px",borderRadius:20,color:"rgba(255,255,255,.8)",display:"inline-block"}}>🕊 Deceased</div>}
      </div>
      <div style={{padding:"0 16px",marginTop:-40}}>
        <PCard>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            <PStat label="Born" val={member.dobYearOnly?member.dob:fmtDate(member.dob)}/>
            <PStat label="Age" val={member.status==="deceased"?"—":(member.dob?`${getAge(member.dob)} yrs`:"—")}/>
            <PStat label="Gender" val={member.gender==="M"?"Male":"Female"}/>
            <PStat label="Status" val={member.status==="deceased"?"Deceased":"Living"} color={member.status==="deceased"?"#9E9E9E":"#2D6A4F"}/>
          </div>
          {member.status==="deceased"&&member.dod&&(
            <div style={{marginTop:14,paddingTop:14,borderTop:"1px solid #E8E5DE"}}>
              <PStat label="Passed Away" val={fmtDate(member.dod)}/>
              {member.hijriDod&&<div style={{fontSize:12,color:"#9E9C94",marginTop:3}}>Hijri: {member.hijriDod}{member.hijriAdj?` (${member.hijriAdj>0?"+":""}${member.hijriAdj})`:""}</div>}
            </div>
          )}
        </PCard>
        {member.bio&&<PCard><PLbl>About</PLbl><p style={{fontSize:14,lineHeight:1.6,color:"#5C5B56"}}>{member.bio}</p></PCard>}
        {(member.email||member.whatsapp)&&(
          <PCard><PLbl>Contact</PLbl>
            {member.email&&<div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}><div style={{width:34,height:34,borderRadius:8,background:"#F4F3EF",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0}}>✉️</div><div style={{fontSize:14}}>{member.email}</div></div>}
            {member.whatsapp&&<div style={{display:"flex",alignItems:"center",gap:10}}><div style={{width:34,height:34,borderRadius:8,background:"#F4F3EF",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0}}>💬</div><div style={{fontSize:14}}>{member.whatsapp}</div></div>}
          </PCard>
        )}
        {house&&(
          <PCard><PLbl>House</PLbl>
            <div style={{background:"#D8EDD4",border:"1px solid #B7D9C8",borderRadius:8,padding:14}}>
              <div style={{fontSize:11,fontWeight:700,color:"#2D6A4F"}}>{house.id}</div>
              <div style={{fontSize:15,fontWeight:600,marginTop:2}}>{house.name}</div>
              <div style={{fontSize:13,color:"#3A7A5A",marginTop:2}}>{house.address}</div>
              <code style={{fontSize:11,background:"#fff",padding:"2px 8px",borderRadius:4,marginTop:6,display:"inline-block"}}>📍 {house.plusCode}</code>
            </div>
          </PCard>
        )}
        {/* Spouses — free text list */}
        {(()=>{
          const spList=(member.spouses||[]).filter(s=>s&&s.name&&s.name.trim());
          if(spList.length===0)return null;
          return(
            <PCard>
              <PLbl>Spouse{spList.length>1?"s":""}</PLbl>
              {spList.map((sp,i)=>(
                <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"10px",background:"#FFFBEF",border:"1px solid #E8C96E",borderRadius:8,marginBottom:i<spList.length-1?8:0}}>
                  <div style={{width:34,height:34,borderRadius:"50%",background:"#C9A84C",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:14,flexShrink:0,fontWeight:700}}>♥</div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:14,fontWeight:600}}>{sp.name}</div>
                    <div style={{fontSize:11,color:"#9E9C94"}}>Spouse {i+1}</div>
                  </div>
                </div>
              ))}
            </PCard>
          );
        })()}
        {children.length>0&&<PCard><PLbl>Children ({children.length})</PLbl>{children.map(c=><MiniRow key={c.id} member={c} branches={branches} onClick={()=>onSelectMember(c)}/>)}</PCard>}
      </div>
      {editing&&<EditMemberModal member={member} isNew={false} branches={branches} houses={houses} members={members} onSave={d=>{onSave(d);setEditing(false);}} onDelete={id=>{onDelete(id);setEditing(false);onBack();}} onClose={()=>setEditing(false)}/>}
    </div>
  );
}

const MiniRow=({member,branches,onClick})=>{
  const color=bColor(member.branchId,branches);
  return <div onClick={onClick} style={{display:"flex",alignItems:"center",gap:10,padding:10,background:"#F4F3EF",borderRadius:8,marginBottom:8,cursor:"pointer"}}><div style={{width:36,height:36,borderRadius:"50%",background:member.status==="deceased"?"#B0BEC5":color,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:12,fontWeight:600,flexShrink:0,overflow:"hidden"}}>{member.photo?<img src={member.photo} alt={member.fullName} style={{width:"100%",height:"100%",objectFit:"cover"}}/>:ini(member.fullName)}</div><div style={{flex:1}}><div style={{fontSize:14,fontWeight:500}}>{member.fullName}</div><div style={{fontSize:11,color:"#9E9C94"}}>{member.dob?(member.dobYearOnly?member.dob:member.dob.slice(0,4)):""}{member.status==="deceased"?" · 🕊":""}</div></div><span style={{color:"#C8C5BE",fontSize:18}}>›</span></div>;
};

// FULL FAMILY TREE OVERVIEW — pan/zoom, all generations, grapefruit style
// ═══════════════════════════════════════════════════════════════

// Layout constants for overview
const OV = {
  nodeW: 80,    // node card width
  nodeH: 72,    // node card height
  hGap:  20,    // horizontal gap between siblings
  vGap:  100,   // vertical gap between generations
  spouseW: 70,  // spouse pill width
  spouseGap: 8, // gap between person and spouse
};

// Compute a tree layout — returns {nodes, edges, totalW, totalH}
// Each node: {id, x, y, w, member, depth, isSpouse}
// Each edge: {x1,y1,x2,y2,color}
function computeLayout(members) {
  if(!members||members.length===0) return {nodes:[],edges:[],totalW:400,totalH:300};

  // Build children map
  const childrenOf = {};
  members.forEach(m=>{ childrenOf[m.id]=[]; });
  members.forEach(m=>{ if(m.parentId&&childrenOf[m.parentId]) childrenOf[m.parentId].push(m); });

  // Sort children: daughters first (left), sons second (right), then by dob
  Object.keys(childrenOf).forEach(pid=>{
    childrenOf[pid].sort((a,b)=>{
      if(a.gender!==b.gender) return a.gender==="F"?-1:1;
      return (a.dob||"")>(b.dob||"")?1:-1;
    });
  });

  const nodes = [];
  const edges = [];

  // Recursive layout — returns subtree width
  function layout(memberId, depth, xOffset) {
    const member = members.find(m=>m.id===memberId);
    if(!member) return 0;
    const children = childrenOf[memberId]||[];

    // Get spouse(s) — first spouse only for display
    const spouseList = (member.spouses||[]).filter(s=>s&&s.name&&s.name.trim());
    const hasSpouse = spouseList.length>0;
    const myBlockW = hasSpouse ? OV.nodeW+OV.spouseGap+OV.spouseW+16 : OV.nodeW;

    let subtreeW;
    if(children.length===0) {
      subtreeW = Math.max(myBlockW, OV.nodeW+OV.hGap);
    } else {
      // Layout children first
      let childX = xOffset;
      const childSubWidths = [];
      children.forEach(child=>{
        const sw = layout(child.id, depth+1, childX);
        childSubWidths.push(sw);
        childX += sw;
      });
      subtreeW = childX - xOffset;
      if(subtreeW < myBlockW) subtreeW = myBlockW+OV.hGap;
    }

    // Position this node centred over its subtree
    const cx = xOffset + subtreeW/2;
    const y  = depth * (OV.nodeH + OV.vGap) + 20;

    nodes.push({ id:memberId, x:cx - OV.nodeW/2, y, w:OV.nodeW, h:OV.nodeH, member, depth, isSpouse:false });

    // Add spouse pill to the right
    if(hasSpouse) {
      spouseList.slice(0,2).forEach((sp,si)=>{
        nodes.push({
          id:`sp_${memberId}_${si}`, x: cx+OV.nodeW/2+OV.spouseGap + si*(OV.spouseW+6),
          y:y+OV.nodeH/2-14, w:OV.spouseW, h:28,
          member:null, spouseName:sp.name, depth, isSpouse:true,
        });
      });
    }

    // Draw edges to children
    const band = getGenBand(depth);
    const parentConnectX = cx;
    const parentConnectY = y + OV.nodeH;

    if(children.length>0) {
      const childNodes = children.map(c=>nodes.find(n=>n.id===c.id)).filter(Boolean);
      if(childNodes.length>0) {
        const firstCX = childNodes[0].x + OV.nodeW/2;
        const lastCX  = childNodes[childNodes.length-1].x + OV.nodeW/2;
        const midY    = parentConnectY + OV.vGap/2;

        // Vertical stem down
        edges.push({x1:parentConnectX,y1:parentConnectY,x2:parentConnectX,y2:midY,color:band.border});
        // Horizontal bar
        if(children.length>1) edges.push({x1:firstCX,y1:midY,x2:lastCX,y2:midY,color:band.border});
        // Vertical drops to each child
        childNodes.forEach(cn=>{
          const cnCX = cn.x+OV.nodeW/2;
          edges.push({x1:cnCX,y1:children.length===1?parentConnectY:midY,x2:cnCX,y2:cn.y,color:band.border});
        });
      }
    }

    return subtreeW;
  }

  layout("root", 0, 0);

  const allX = nodes.map(n=>n.x);
  const allY = nodes.map(n=>n.y);
  const minX = Math.min(...allX) - 20;
  const maxX = Math.max(...allX.map((x,i)=>x+nodes[i].w)) + 20;
  const maxY = Math.max(...allY.map((y,i)=>y+nodes[i].h)) + 60;

  // Shift all nodes so minX=0
  nodes.forEach(n=>{ n.x-=minX; });
  edges.forEach(e=>{ e.x1-=minX; e.x2-=minX; });

  return { nodes, edges, totalW: maxX-minX, totalH: maxY };
}

// Overview node card (pure visual, no interaction)
function OvNode({node, branches}) {
  if(node.isSpouse) {
    return (
      <div style={{
        position:"absolute", left:node.x, top:node.y,
        width:node.w, height:node.h,
        background:"#FFFBEF", border:"1.5px solid #C9A84C",
        borderRadius:14, display:"flex", alignItems:"center", justifyContent:"center",
        padding:"0 6px",
      }}>
        <div style={{fontSize:8,fontWeight:700,color:"#8B6914",textAlign:"center",lineHeight:1.3,overflow:"hidden",wordBreak:"break-word"}}>
          <span style={{color:"#C9A84C",fontSize:10}}>♥</span><br/>{node.spouseName}
        </div>
      </div>
    );
  }
  const m = node.member;
  if(!m) return null;
  const isMale = m.gender==="M";
  const isDeceased = m.status==="deceased";
  const band = getGenBand(node.depth);
  const isRoot = m.id==="root"||m.id==="moosa";
  const borderColor = isRoot ? band.accent : isMale ? "#1565C0" : "#6A1E55";
  const bgColor     = isRoot ? band.bg     : isMale ? "#EEF4FB"  : "#FDF0F8";

  return (
    <div style={{
      position:"absolute", left:node.x, top:node.y,
      width:node.w, height:node.h,
      background: isRoot ? band.bg : bgColor,
      border:`${isRoot?2:1.5}px solid ${borderColor}`,
      borderRadius:12,
      display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center",
      gap:3, padding:"6px 4px",
      opacity: isDeceased ? 0.75 : 1,
      boxShadow: isRoot ? `0 2px 10px ${band.border}60` : "0 1px 4px rgba(0,0,0,.08)",
    }}>
      {/* Avatar */}
      <div style={{
        width:32, height:32, borderRadius:"50%",
        background: isDeceased?"#90A4AE": isRoot?band.accent: isMale?"#1565C0":"#6A1E55",
        display:"flex", alignItems:"center", justifyContent:"center",
        color:"#fff", fontWeight:700, fontSize:10, overflow:"hidden", flexShrink:0,
      }}>
        {m.photo
          ? <img src={m.photo} alt={m.fullName} style={{width:"100%",height:"100%",objectFit:"cover"}}/>
          : ini(m.fullName)
        }
      </div>
      {/* Name */}
      <div style={{fontSize:8,fontWeight:700,textAlign:"center",lineHeight:1.3,
        color:isRoot?band.accent:borderColor,
        overflow:"hidden",maxWidth:"100%",wordBreak:"break-word",
      }}>
        {m.nickName||m.fullName.split(" ").slice(0,2).join(" ")}
      </div>
      {/* Year + gender */}
      <div style={{fontSize:7,color:"#9E9C94",display:"flex",alignItems:"center",gap:2}}>
        {isDeceased?"🕊 ":""}{m.dob?(m.dobYearOnly?m.dob:m.dob.slice(0,4)):""}
        <span style={{color:borderColor}}>{isMale?"♂":"♀"}</span>
      </div>
    </div>
  );
}

// Generation band background strips
function GenBandStrips({members, totalW, totalH}) {
  // Find min/max Y per depth
  const depthMap = {};
  members.forEach(m=>{
    let depth=0, id=m.id;
    while(id){const p=members.find(x=>x.id===id);if(!p||!p.parentId)break;depth++;id=p.parentId;}
    if(!depthMap[depth]) depthMap[depth]={min:Infinity,max:-Infinity};
    const y = depth*(OV.nodeH+OV.vGap)+20;
    depthMap[depth].min=Math.min(depthMap[depth].min,y-10);
    depthMap[depth].max=Math.max(depthMap[depth].max,y+OV.nodeH+10);
  });
  return (
    <>
      {Object.entries(depthMap).map(([d,{min,max}])=>{
        const band=getGenBand(Number(d));
        return (
          <div key={d} style={{
            position:"absolute",left:0,top:min,width:totalW,height:max-min,
            background:band.bg,borderTop:`1px solid ${band.border}20`,
            borderBottom:`1px solid ${band.border}20`,
          }}>
            <div style={{position:"absolute",left:8,top:4,fontSize:8,fontWeight:700,
              color:band.accent,opacity:.5,letterSpacing:"0.05em",whiteSpace:"nowrap"}}>
              {band.label}
            </div>
          </div>
        );
      })}
    </>
  );
}

function OverviewTreeScreen({db}) {
  const {members,branches}=db;
  const containerRef = useRef(null);
  const [transform, setTransform] = useState({x:20,y:60,scale:0.55});
  const drag = useRef({active:false,startX:0,startY:0,startTX:0,startTY:0});
  const pinch = useRef({active:false,startDist:0,startScale:1});

  const layout = useMemo(()=>computeLayout(members),[members]);

  // Mouse drag
  const onMouseDown = e=>{
    drag.current={active:true,startX:e.clientX,startY:e.clientY,startTX:transform.x,startTY:transform.y};
  };
  const onMouseMove = e=>{
    if(!drag.current.active)return;
    setTransform(t=>({...t,x:drag.current.startTX+(e.clientX-drag.current.startX),y:drag.current.startTY+(e.clientY-drag.current.startY)}));
  };
  const onMouseUp=()=>{ drag.current.active=false; };

  // Touch pan + pinch zoom
  const getTouchDist=touches=>Math.hypot(touches[0].clientX-touches[1].clientX,touches[0].clientY-touches[1].clientY);
  const onTouchStart=e=>{
    if(e.touches.length===1){
      drag.current={active:true,startX:e.touches[0].clientX,startY:e.touches[0].clientY,startTX:transform.x,startTY:transform.y};
    } else if(e.touches.length===2){
      drag.current.active=false;
      pinch.current={active:true,startDist:getTouchDist(e.touches),startScale:transform.scale,startX:transform.x,startY:transform.y};
    }
  };
  const onTouchMove=e=>{
    e.preventDefault();
    if(e.touches.length===1&&drag.current.active){
      setTransform(t=>({...t,x:drag.current.startTX+(e.touches[0].clientX-drag.current.startX),y:drag.current.startTY+(e.touches[0].clientY-drag.current.startY)}));
    } else if(e.touches.length===2&&pinch.current.active){
      const dist=getTouchDist(e.touches);
      const scale=Math.min(3,Math.max(0.2,pinch.current.startScale*(dist/pinch.current.startDist)));
      setTransform(t=>({...t,scale}));
    }
  };
  const onTouchEnd=()=>{ drag.current.active=false; pinch.current.active=false; };

  // Wheel zoom
  const onWheel=e=>{
    e.preventDefault();
    const factor=e.deltaY>0?0.9:1.1;
    setTransform(t=>({...t,scale:Math.min(3,Math.max(0.15,t.scale*factor))}));
  };

  // Zoom buttons
  const zoomIn=()=>setTransform(t=>({...t,scale:Math.min(3,t.scale*1.2)}));
  const zoomOut=()=>setTransform(t=>({...t,scale:Math.max(0.15,t.scale*0.8)}));
  const resetView=()=>setTransform({x:20,y:60,scale:0.55});

  useEffect(()=>{
    const el=containerRef.current;
    if(!el)return;
    el.addEventListener("wheel",onWheel,{passive:false});
    return()=>el.removeEventListener("wheel",onWheel);
  },[]);

  return (
    <div style={{display:"flex",flexDirection:"column",height:"100%",background:"#F5F4F0",overflow:"hidden"}}>
      {/* Header */}
      <div style={{padding:"50px 16px 10px",flexShrink:0,background:"#fff",borderBottom:"1px solid #EDECEA"}}>
        <div style={{fontFamily:"'Playfair Display',serif",fontSize:20,fontWeight:700,marginBottom:2}}>Full Family Tree</div>
        <div style={{fontSize:11,color:"#9E9C94"}}>Pinch to zoom · Drag to pan · {members.length} members</div>
      </div>

      {/* Zoom controls */}
      <div style={{position:"absolute",bottom:96,right:16,zIndex:30,display:"flex",flexDirection:"column",gap:8}}>
        <button onClick={zoomIn}  style={{width:36,height:36,borderRadius:"50%",border:"1px solid #E8E5DE",background:"#fff",fontSize:18,cursor:"pointer",boxShadow:"0 2px 8px rgba(0,0,0,.1)",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"inherit",fontWeight:700}}>+</button>
        <button onClick={zoomOut} style={{width:36,height:36,borderRadius:"50%",border:"1px solid #E8E5DE",background:"#fff",fontSize:18,cursor:"pointer",boxShadow:"0 2px 8px rgba(0,0,0,.1)",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"inherit",fontWeight:700}}>−</button>
        <button onClick={resetView} style={{width:36,height:36,borderRadius:"50%",border:"1px solid #E8E5DE",background:"#fff",fontSize:12,cursor:"pointer",boxShadow:"0 2px 8px rgba(0,0,0,.1)",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"inherit"}}>⌂</button>
      </div>

      {/* Legend */}
      <div style={{position:"absolute",top:116,left:16,zIndex:30,background:"rgba(255,255,255,.9)",borderRadius:8,padding:"5px 10px",border:"1px solid #E8E5DE",display:"flex",gap:10}}>
        <div style={{display:"flex",alignItems:"center",gap:3}}><div style={{width:8,height:8,borderRadius:2,background:"#EEF4FB",border:"1.5px solid #1565C0"}}/><span style={{fontSize:8,color:"#9E9C94"}}>♂</span></div>
        <div style={{display:"flex",alignItems:"center",gap:3}}><div style={{width:8,height:8,borderRadius:2,background:"#FDF0F8",border:"1.5px solid #6A1E55"}}/><span style={{fontSize:8,color:"#9E9C94"}}>♀</span></div>
        <div style={{display:"flex",alignItems:"center",gap:3}}><div style={{width:8,height:8,borderRadius:8,background:"#FFFBEF",border:"1.5px solid #C9A84C"}}/><span style={{fontSize:8,color:"#9E9C94"}}>♥</span></div>
      </div>

      {/* Pannable canvas */}
      <div ref={containerRef}
        onMouseDown={onMouseDown} onMouseMove={onMouseMove} onMouseUp={onMouseUp} onMouseLeave={onMouseUp}
        onTouchStart={onTouchStart} onTouchMove={onTouchMove} onTouchEnd={onTouchEnd}
        style={{flex:1,overflow:"hidden",cursor:"grab",position:"relative",touchAction:"none",userSelect:"none"}}
      >
        <div style={{
          position:"absolute",
          transform:`translate(${transform.x}px,${transform.y}px) scale(${transform.scale})`,
          transformOrigin:"0 0",
          width:layout.totalW, height:layout.totalH,
          transition:"none",
        }}>
          {/* Generation band background strips */}
          <GenBandStrips members={members} totalW={layout.totalW} totalH={layout.totalH}/>

          {/* SVG edges */}
          <svg style={{position:"absolute",top:0,left:0,width:layout.totalW,height:layout.totalH,overflow:"visible",pointerEvents:"none"}}>
            {layout.edges.map((e,i)=>(
              <line key={i} x1={e.x1} y1={e.y1} x2={e.x2} y2={e.y2}
                stroke={e.color} strokeWidth={1.5} strokeLinecap="round" opacity={0.7}/>
            ))}
          </svg>

          {/* Node cards */}
          {layout.nodes.map(node=>(
            <OvNode key={node.id} node={node} branches={branches}/>
          ))}
        </div>
      </div>
    </div>
  );
}

function SearchScreen({db,onGoToTree}) {
  const {members,branches}=db;
  const [q,setQ]=useState(""); const [filter,setFilter]=useState("all");
  const results=(q||filter!=="all")?members.filter(m=>{
    if(m.id==="moosa")return false;
    if(filter==="deceased"&&m.status!=="deceased")return false;
    if(filter==="living"&&m.status==="deceased")return false;
    if(filter.startsWith("b_")&&m.branchId!==Number(filter.slice(2)))return false;
    const bn=branches.find(b=>b.id===m.branchId)?.name||"";
    const lq=q.toLowerCase();
    return !lq||m.fullName.toLowerCase().includes(lq)||(m.nickName||"").toLowerCase().includes(lq)||bn.toLowerCase().includes(lq);

  return (
    <div style={{padding:"52px 16px 20px"}}>
      <div style={{fontFamily:"'Playfair Display',serif",fontSize:26,fontWeight:700,marginBottom:14}}>Search</div>

      </div>
      <div style={{display:"flex",gap:6,marginBottom:14,flexWrap:"wrap"}}>

          <button key={id} onClick={()=>setFilter(id)} style={{padding:"6px 12px",borderRadius:20,border:`1.5px solid ${filter===id?"#2D6A4F":"#E8E5DE"}`,background:filter===id?"#2D6A4F":"#fff",color:filter===id?"#fff":"#5C5B56",fontSize:12,cursor:"pointer",fontWeight:600,fontFamily:"inherit"}}>{lbl}</button>
        ))}
        {branches.map(b=><button key={b.id} onClick={()=>setFilter(`b_${b.id}`)} style={{padding:"6px 10px",borderRadius:20,border:`1.5px solid ${filter===`b_${b.id}`?b.color:"#E8E5DE"}`,background:filter===`b_${b.id}`?b.color:"#fff",color:filter===`b_${b.id}`?"#fff":"#5C5B56",fontSize:11,cursor:"pointer",fontWeight:600,fontFamily:"inherit"}}>{b.name.split(" ")[0]}</button>)}
      </div>
      {!q&&filter==="all"&&<div style={{textAlign:"center",padding:"40px 20px",color:"#9E9C94"}}><div style={{fontSize:40,marginBottom:10}}>🌿</div><div style={{fontSize:14}}>Type a name — results jump to the tree.</div></div>}
      {results.map(m=>{const b=branches.find(x=>x.id===m.branchId);return(
        <div key={m.id} onClick={()=>onGoToTree(m.id)} style={{display:"flex",alignItems:"center",gap:12,padding:12,background:"#fff",border:"1px solid #E8E5DE",borderRadius:10,marginBottom:8,cursor:"pointer"}}>
          <div style={{width:42,height:42,borderRadius:"50%",background:b?.color||"#607D8B",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:13,fontWeight:600,flexShrink:0,opacity:m.status==="deceased"?.7:1}}>{ini(m.fullName)}</div>
          <div style={{flex:1}}><div style={{fontSize:15,fontWeight:600}}>{m.fullName}{m.nickName?` "${m.nickName}"`:""}</div><div style={{fontSize:12,color:"#9E9C94",marginTop:2}}>{b?.name||"Root"} · {m.dob?(m.dobYearOnly?m.dob:m.dob.slice(0,4)):""}{m.status==="deceased"?" · 🕊":""}</div></div>
          <span style={{fontSize:12,fontWeight:700,color:"#2D6A4F",background:"#D8EDD4",padding:"4px 10px",borderRadius:10,whiteSpace:"nowrap"}}>→ Tree</span>
        </div>
      );})}
      {q&&results.length===0&&<div style={{textAlign:"center",padding:"40px 20px",color:"#9E9C94"}}><div style={{fontSize:36,marginBottom:10}}>🍃</div>No members found for "{q}"</div>}
    </div>
  );
}

function AdminBranches({db,updateDB,onToast}) {
  const {branches}=db;
  const move=(idx,dir)=>{ const arr=[...branches].sort((a,b)=>a.order-b.order); const ni=idx+dir; if(ni<0||ni>=arr.length)return; const tmp=arr[idx].order; arr[idx]={...arr[idx],order:arr[ni].order}; arr[ni]={...arr[ni],order:tmp}; updateDB("branches",arr); onToast("✅ Updated"); };
  const toggle=(id)=>{ updateDB("branches",branches.map(b=>b.id===id?{...b,discontinued:!b.discontinued}:b)); onToast("✅ Updated"); };
  const sorted=[...branches].sort((a,b)=>a.order-b.order);
  return (
    <div>
      <div style={{fontFamily:"'Playfair Display',serif",fontSize:18,fontWeight:700,marginBottom:6}}>Branches</div>
      <div style={{fontSize:13,color:"#9E9C94",marginBottom:14}}>Use arrows to reorder. Toggle discontinued status.</div>
      {sorted.map((b,i)=><div key={b.id} style={{background:"#fff",border:"1px solid #E8E5DE",borderRadius:12,padding:"12px 14px",marginBottom:8,display:"flex",alignItems:"center",gap:10}}>
        <div style={{display:"flex",flexDirection:"column",gap:3}}>
          <button onClick={()=>move(i,-1)} disabled={i===0} style={{width:22,height:22,border:"1px solid #E8E5DE",background:i===0?"#F9F9F9":"#fff",borderRadius:4,cursor:i===0?"default":"pointer",fontSize:11,display:"flex",alignItems:"center",justifyContent:"center",color:i===0?"#C8C5BE":"#5C5B56"}}>▲</button>
          <button onClick={()=>move(i,1)} disabled={i===sorted.length-1} style={{width:22,height:22,border:"1px solid #E8E5DE",background:i===sorted.length-1?"#F9F9F9":"#fff",borderRadius:4,cursor:i===sorted.length-1?"default":"pointer",fontSize:11,display:"flex",alignItems:"center",justifyContent:"center",color:i===sorted.length-1?"#C8C5BE":"#5C5B56"}}>▼</button>
        </div>
        <div style={{width:14,height:14,borderRadius:"50%",background:b.color,flexShrink:0}}/>
        <div style={{flex:1}}><div style={{fontWeight:600,fontSize:14}}>{b.name}</div><div style={{fontSize:11,color:"#9E9C94"}}>Order #{b.order}</div></div>
        <button onClick={()=>toggle(b.id)} style={{padding:"5px 10px",border:"1px solid",borderColor:b.discontinued?"#FECACA":"#E8E5DE",background:b.discontinued?"#FEF2F2":"#F4F3EF",color:b.discontinued?"#DC2626":"#5C5B56",borderRadius:6,fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>{b.discontinued?"Discontinued":"Active"}</button>
      </div>)}
    </div>
  );
}

function AdminBackup({db,onToast}) {
  const handleExport=()=>{
    const backup={exportedAt:new Date().toISOString(),version:"4.0",tables:{members:db.members,branches:db.branches,houses:db.houses,announcements:db.announcements,users:db.users,settings:db.settings}};
    const blob=new Blob([JSON.stringify(backup,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob); const a=document.createElement("a"); a.href=url; a.download=`family_tree_backup_${new Date().toISOString().slice(0,10)}.json`; a.click(); URL.revokeObjectURL(url);
    onToast("💾 Backup downloaded");
  };
  const handleImport=(e)=>{ const file=e.target.files[0]; if(!file)return; const r=new FileReader(); r.onload=(ev)=>{ try{JSON.parse(ev.target.result);onToast("✅ Valid backup — use developer to restore");}catch{onToast("❌ Invalid file");} }; r.readAsText(file); };
  return (
    <div>
      <div style={{fontFamily:"'Playfair Display',serif",fontSize:18,fontWeight:700,marginBottom:14}}>Backup & Restore</div>
      <PCard><PLbl>Current Data</PLbl><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}><div style={{background:"#F4F3EF",borderRadius:8,padding:12,textAlign:"center"}}><div style={{fontFamily:"'Playfair Display',serif",fontSize:24,fontWeight:700,color:"#2D6A4F"}}>{db.members.length}</div><div style={{fontSize:12,color:"#9E9C94"}}>Members</div></div><div style={{background:"#F4F3EF",borderRadius:8,padding:12,textAlign:"center"}}><div style={{fontFamily:"'Playfair Display',serif",fontSize:24,fontWeight:700,color:"#2D6A4F"}}>~{Math.round(JSON.stringify(db).length/1024)}kb</div><div style={{fontSize:12,color:"#9E9C94"}}>Data size</div></div></div></PCard>
      <PCard><PLbl>Export</PLbl><div style={{fontSize:13,color:"#5C5B56",marginBottom:12,lineHeight:1.6}}>Download all family data as a JSON file. Keep this safe — it's your backup.</div><Btn onClick={handleExport} style={{width:"100%",padding:13}}>💾 Download backup.json</Btn></PCard>
      <PCard><PLbl>Import</PLbl><label style={{display:"block",width:"100%",padding:13,background:"#F4F3EF",border:"1.5px dashed #C8C5BE",borderRadius:8,textAlign:"center",cursor:"pointer",fontSize:14,fontWeight:600,color:"#5C5B56",fontFamily:"inherit"}}>📂 Choose backup.json<input type="file" accept=".json" onChange={handleImport} style={{display:"none"}}/></label></PCard>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// PHOTOS + HASTHAM
// ═══════════════════════════════════════════════════════════════
function PhotosScreen({user}) {
  const albums=[{id:1,name:"Old Photos",cover:"📷",bg:"linear-gradient(135deg,#FFF3E0,#FFE0B2)",count:2},{id:2,name:"Weddings",cover:"💒",bg:"linear-gradient(135deg,#FCE4EC,#F8BBD0)",count:1},{id:3,name:"Events",cover:"🎉",bg:"linear-gradient(135deg,#E8F5E9,#C8E6C9)",count:1},{id:4,name:"Childhood",cover:"🌟",bg:"linear-gradient(135deg,#E3F2FD,#BBDEFB)",count:0}];
  return <div><div style={{padding:"52px 20px 14px"}}><div style={{fontFamily:"'Playfair Display',serif",fontSize:28,fontWeight:700}}>Photos</div><div style={{fontSize:13,color:"#9E9C94",marginTop:4}}>Family memories & albums</div></div>{user.role==="super_admin"&&<div style={{padding:"0 16px 14px"}}><button style={{width:"100%",padding:12,background:"#2D6A4F",color:"#fff",border:"none",borderRadius:8,fontSize:14,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>+ Upload Photo</button></div>}<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,padding:"0 16px"}}>{albums.map(a=><div key={a.id} style={{background:"#fff",border:"1px solid #E8E5DE",borderRadius:14,overflow:"hidden",cursor:"pointer"}}><div style={{height:110,display:"flex",alignItems:"center",justifyContent:"center",fontSize:48,background:a.bg}}>{a.cover}</div><div style={{padding:"10px 12px"}}><div style={{fontSize:14,fontWeight:600}}>{a.name}</div><div style={{fontSize:12,color:"#9E9C94",marginTop:2}}>{a.count} photos</div></div></div>)}</div></div>;
}

function HashthamScreen({db,user}) {
  if(!db.settings.feature_charity_enabled)return<div style={{textAlign:"center",padding:"60px 20px",color:"#9E9C94"}}><div style={{fontSize:48,marginBottom:12}}>🔧</div>Disabled by admin.</div>;
  if(!can.accessHastham(user))return<div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"60vh",padding:"40px 20px",textAlign:"center"}}><div style={{fontSize:64,marginBottom:20}}>🔒</div><div style={{fontFamily:"'Playfair Display',serif",fontSize:24,fontWeight:700,marginBottom:8}}>Restricted Access</div><div style={{fontSize:14,color:"#9E9C94"}}>Contact {db.settings.contact_admin_email||"a Super Admin"}.</div></div>;
  return<div style={{padding:"52px 16px 20px"}}><div style={{fontFamily:"'Playfair Display',serif",fontSize:28,fontWeight:700,marginBottom:4}}>Hastham</div><div style={{fontSize:13,color:"#9E9C94",marginBottom:24}}>Family Charity Module</div><PCard><PLbl>Total Collected</PLbl><div style={{fontFamily:"'Playfair Display',serif",fontSize:36,fontWeight:700,color:"#2D6A4F"}}>₹ 0</div><div style={{fontSize:13,color:"#9E9C94",marginTop:4}}>Current year</div></PCard><div style={{textAlign:"center",padding:20,color:"#9E9C94",fontSize:14}}>🤲 Donation tracking coming soon</div></div>;
}

// ═══════════════════════════════════════════════════════════════
// ROOT APP
// ═══════════════════════════════════════════════════════════════
function App() {
  const [db,updateDB]=useDB();
  const [tab,setTab]=useState("home");
  const [profileStack,setProfileStack]=useState([]);
  const [toast,setToast]=useState(null);
  const [treeHighlight,setTreeHighlight]=useState(null);
  const user=SESSION_USER;

  const handleSave=(data)=>{
    if(!db)return;
    const u=db.members.some(m=>m.id===data.id)?db.members.map(m=>m.id===data.id?data:m):[...db.members,data];
    updateDB("members",u);
    // Refresh entire profile stack with updated data so name change shows immediately
    setProfileStack(s=>s.map(p=>p.id===data.id?data:p));
    setToast("✅ Saved — "+data.fullName);
  };
  const handleDelete=(id)=>{ if(!db)return; updateDB("members",db.members.filter(m=>m.id!==id)); setProfileStack([]); setToast("🗑️ Deleted"); };
  const openProfile=(m)=>setProfileStack(s=>[...s,m]);
  const closeProfile=()=>setProfileStack(s=>s.slice(0,-1));
  const navigate=(t)=>{ setTab(t); setProfileStack([]); };
  const goToTree=(mid)=>{ setTreeHighlight(mid); setTab("tree"); setProfileStack([]); };

  if(!db)return<div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100vh"}}><div style={{fontFamily:"'Playfair Display',serif",fontSize:24,fontWeight:700,color:"#2D6A4F",marginBottom:10}}>Family Tree</div><div style={{fontSize:13,color:"#9E9C94"}}>Loading…</div></div>;

  const freshProfile=profileStack.length>0?(db.members.find(m=>m.id===profileStack[profileStack.length-1].id)||profileStack[profileStack.length-1]):null;
  const TABS=[{id:"home",icon:"🏠",label:"Home"},{id:"tree",icon:"🌳",label:"Tree"},{id:"search",icon:"🔍",label:"Search"},{id:"photos",icon:"📸",label:"Photos"},{id:"admin",icon:"⚙️",label:"Admin"}];

  return (
    <>
      <div style={{display:"flex",flexDirection:"column",height:"100vh",maxWidth:430,margin:"0 auto",background:"#FAFAF8",position:"relative",overflow:"hidden"}}>
        <div style={{flex:1,overflow:"hidden",position:"relative"}}>
          {freshProfile&&<div style={{position:"absolute",inset:0,background:"#FAFAF8",zIndex:20,overflowY:"auto"}}><MemberProfile member={freshProfile} db={db} onBack={closeProfile} onSelectMember={openProfile} user={user} onSave={handleSave} onDelete={handleDelete}/></div>}
          <div style={{height:"100%",overflow:tab==="tree"?"hidden":"auto"}}>
            {tab==="home"&&<HomeScreen db={db} onNavigate={navigate} user={user}/>}
            {tab==="tree"&&<TreeScreen db={db} updateDB={updateDB} onProfile={openProfile} highlightId={treeHighlight} clearHighlight={()=>setTreeHighlight(null)} user={user}/>}
            {tab==="search"&&<SearchScreen db={db} onGoToTree={goToTree}/>}
            {tab==="photos"&&<PhotosScreen user={user}/>}
            {tab==="admin"&&<AdminPanel db={db} updateDB={updateDB} user={user} onToast={setToast}/>}
            {tab==="hastham"&&<HashthamScreen db={db} user={user}/>}
          </div>
        </div>
        <nav style={{flexShrink:0,background:"rgba(255,255,255,.96)",backdropFilter:"blur(20px)",borderTop:"1px solid #E8E5DE",display:"flex",padding:"8px 0",zIndex:50}}>
          {TABS.map(({id,icon,label})=>(
            <button key={id} onClick={()=>navigate(id)} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3,padding:"6px 4px",border:"none",background:"none",cursor:"pointer"}}>
              <span style={{fontSize:19}}>{icon}</span>
              <span style={{fontSize:10,fontWeight:600,color:tab===id&&!freshProfile?"#2D6A4F":"#9E9C94"}}>{label}</span>
            </button>
          ))}
        </nav>
      </div>
      {toast&&<Toast msg={toast} onDone={()=>setToast(null)}/>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
